<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kova Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        }
        
        .glass-effect {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .hover-glow {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .hover-glow:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 40px -10px rgba(255, 255, 255, 0.1);
        }
        
        .hover-glow:active {
            transform: translateY(0) scale(0.98);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-white">
    <div class="max-w-sm w-full flex flex-col items-center text-center space-y-8 animate-fade-in">
        
        <!-- Logo Placeholder -->
        <div class="relative">
            <div class="absolute inset-0 bg-white/20 rounded-full blur-2xl opacity-20"></div>
            <div class="relative w-28 h-28 rounded-full bg-gradient-to-br from-gray-800 to-gray-900 border border-gray-700 flex items-center justify-center shadow-2xl">
                <img src="kova.png" class="w-full h-full object-cover rounded-full">
            </div>
        </div>
        
        <!-- Title and Description -->
        <div class="space-y-3">
            <h1 class="text-4xl font-bold tracking-tight bg-gradient-to-r from-white to-gray-300 bg-clip-text text-transparent">
                Kova Community
            </h1>
            <p class="text-gray-400 text-sm font-light leading-relaxed max-w-xs mx-auto">
                Follow us on social media and stay connected.
            </p>
        </div>
        
        <!-- Social Buttons -->
        <div class="w-full space-y-3">
            <!-- Instagram -->
            <a href="https://www.instagram.com/kova.community25?utm_source=qr&igsh=Z3loYjdyZGJmdmdr" class="group flex items-center justify-center gap-3 w-full py-4 px-8 glass-effect rounded-2xl hover-glow">
                <i data-lucide="instagram" class="w-5 h-5 text-pink-500 group-hover:scale-110 transition-transform duration-300"></i>
                <span class="font-semibold text-gray-200 group-hover:text-white tracking-wide">Instagram</span>
            </a>
            
            <!-- TikTok -->
            <a href="https://www.tiktok.com/@kovacommunity?_r=1&_t=ZS-94OH1J6PaEe" class="group flex items-center justify-center gap-3 w-full py-4 px-8 glass-effect rounded-2xl hover-glow">
                <i data-lucide="music-2" class="w-5 h-5 text-cyan-400 group-hover:scale-110 transition-transform duration-300"></i>
                <span class="font-semibold text-gray-200 group-hover:text-white tracking-wide">TikTok</span>
            </a>
            
            <!-- Facebook -->
            <a href="https://www.facebook.com/share/17FvzLG3wx/" class="group flex items-center justify-center gap-3 w-full py-4 px-8 glass-effect rounded-2xl hover-glow">
                <i data-lucide="facebook" class="w-5 h-5 text-blue-500 group-hover:scale-110 transition-transform duration-300"></i>
                <span class="font-semibold text-gray-200 group-hover:text-white tracking-wide">Facebook</span>
            </a>
            
            <!-- LinkedIn -->
            <a href="https://www.linkedin.com/in/kova-community-71a8273ab?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app" class="group flex items-center justify-center gap-3 w-full py-4 px-8 glass-effect rounded-2xl hover-glow">
                <i data-lucide="linkedin" class="w-5 h-5 text-blue-600 group-hover:scale-110 transition-transform duration-300"></i>
                <span class="font-semibold text-gray-200 group-hover:text-white tracking-wide">LinkedIn</span>
            </a>
        </div>
        
        <!-- Footer -->
        <p class="text-xs text-gray-600 font-light pt-4 tracking-wider uppercase">
            © 2026 Kova Community
        </p>

<p class="text-xs text-gray-500">
    Made by Yehia wael (the head of IT TEAM)
</p>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
